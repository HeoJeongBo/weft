name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Creates the GitHub Release in this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A fine-grained PAT with contents:write on HeoJeongBo/homebrew-tap,
          # needed to push the cask to the separate tap repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
