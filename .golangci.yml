version: "2"

run:
  timeout: 5m

linters:
  # The default set already enables errcheck, govet, ineffassign, staticcheck,
  # and unused. We add a curated handful on top.
  enable:
    - bodyclose
    - gocritic
    - misspell
    - nilerr
    - revive
  settings:
    errcheck:
      # Writes to stdout/stderr are intentionally unchecked throughout the CLI/TUI.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    rules:
      # Test code intentionally ignores cleanup errors (Close/Setenv/etc.).
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/HeoJeongBo/weft
